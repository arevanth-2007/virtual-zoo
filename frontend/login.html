<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Virtual Zoo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="form-container">
            <div class="logo">🐾 Virtual Zoo</div>
            <p class="form-subtitle">Sign in to start exploring</p>
            <form id="authForm">
                <div class="form-group">
                    <input type="email" id="email" class="form-control" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" id="loginBtn" class="btn btn-primary" style="flex: 1;">Login</button>
                    <button type="button" id="signupBtn" class="btn btn-outline" style="flex: 1;">Sign Up</button>
                </div>
            </form>
            <div id="message" style="margin-top: 1.5rem; text-align: center; color: var(--danger); font-weight: 500;"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
